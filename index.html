l<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBZ - All Cooldowns Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #87CEEB 60%, #ceb18d 60%); overflow: hidden; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:100; }

        /* MENUS */
        .game-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 3px solid #f1c40f; padding: 30px; text-align: center; z-index: 500; border-radius: 20px; color: white; box-shadow: 0 0 30px gold; }
        #lose-menu { border-color: #e74c3c; box-shadow: 0 0 30px #e74c3c; }
        .m-btn { display: block; width: 220px; padding: 15px; margin: 10px auto; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next { background: #27ae60; color: white; } .retry { background: #2980b9; color: white; } .restart { background: #e74c3c; color: white; }

        /* HUD */
        .hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 30; pointer-events: none; color: white; font-size: 10px; }
        .bar { width: 150px; height: 12px; border: 1px solid #fff; background: #333; position: relative; }
        .fill { height: 100%; transition: width 0.1s; }
        #hp-fill { background: #00ff00; width: 100%; }
        #enemy-hp { background: #f00; width: 100%; }

        /* PERSONAGENS */
        #player, #enemy { position: absolute; width: 50px; height: 100px; bottom: 40%; z-index: 10; }
        .hair-goku { position: absolute; top: -35px; left: -15px; width: 80px; height: 60px; background: #000; clip-path: polygon(25% 100%, 0% 80%, 10% 60%, 25% 20%, 45% 55%, 55% 0%, 70% 50%, 95% 30%, 85% 75%, 100% 100%); z-index: 5; }
        .ssj .hair-goku { background: #f1c40f !important; filter: drop-shadow(0 0 12px gold); }
        
        #e-hair { display: none; position: absolute; top: -45px; left: -10px; width: 70px; height: 65px; background: #000; clip-path: polygon(50% 100%, 0% 70%, 5% 30%, 25% 0%, 50% 25%, 75% 0%, 95% 30%, 100% 70%); z-index: 6; }
        .e-head-shape { position: absolute; top: 0; left: 10px; width: 30px; height: 32px; background: #fff; border-radius: 50% 50% 45% 45%; border-top: 8px solid #a020f0; z-index: 5; }
        #enemy.vegeta-mode .e-head-shape { background: #ffdbac !important; border: none !important; }
        #enemy.vegeta-mode #e-hair { display: block; }

        .arm, .f-arm { position: absolute; top: 35px; width: 12px; height: 30px; background: #ffdbac; border: 2px solid #e0ac69; border-radius: 5px; transform-origin: top; transition: 0.1s; }
        
        /* POSES */
        #player.punching .arm.right { transform: rotate(-100deg) scaleX(1.8) !important; z-index: 20 !important; }
        #player.ki-pose .arm.right { transform: rotate(-90deg) scaleX(1.5) !important; z-index: 20 !important; }
        #player.kame-pose .arm.left { transform: rotate(120deg) translateX(10px) !important; z-index: 20 !important; }
        #player.kame-pose .arm.right { transform: rotate(100deg) translateX(15px) !important; z-index: 20 !important; }
        #player.genki-pose .arm.left, #player.genki-pose .arm.right { transform: rotate(180deg) translateY(10px) !important; z-index: 20 !important; }
        #enemy.shooting .f-arm.right { transform: rotate(-90deg) scaleX(1.4) !important; }
        #enemy.e-punching .f-arm.left { transform: rotate(90deg) scaleX(1.6) !important; }

        /* PODERES */
        .kame-beam { position: absolute; height: 40px; background: #fff; box-shadow: 0 0 30px #00f, 0 0 60px #00ffff; display: none; z-index: 8; border-radius: 20px; }
        #genki-sphere { position: absolute; width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 0 80px 40px #87CEEB; display: none; z-index: 20; transition: 1.5s; transform: translateX(-50%); }
        #super-nova { position: absolute; width: 20px; height: 20px; background: #ff4500; border-radius: 50%; box-shadow: 0 0 50px 20px orange, 0 0 80px 40px red; display: none; z-index: 25; transition: 1.5s; transform: translateX(-50%); }

        /* CONTROLES */
        .controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
        #joy { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 65px); gap: 8px; pointer-events: auto; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 8px; box-shadow: 0 4px #222; transition: 0.2s; }
        .btn-ssj { background: #444; position: absolute; top: -75px; right: 0; width: 130px; height: 40px; border-radius: 10px; }
        .ready { background: #f1c40f !important; color: #000; box-shadow: 0 0 15px gold; }
        .cooldown { background: #555 !important; opacity: 0.6; filter: grayscale(1); box-shadow: 0 2px #111 !important; }
        .leg { position: absolute; top: 70px; width: 16px; height: 30px; background: #ff6600; border-bottom: 6px solid #00008b; transform-origin: top center; }
        .walking .leg { animation: walk 0.3s infinite alternate; }
        @keyframes walk { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }
    </style>
</head>
<body>

<div id="flash"></div>

<div id="win-menu" class="game-menu">
    <h1 id="win-title">VITÓRIA!</h1>
    <button class="m-btn next" onclick="advancePhase()">PRÓXIMA FASE</button>
    <button class="m-btn retry" onclick="resetLevel()">REPETIR FASE</button>
</div>

<div id="lose-menu" class="game-menu">
    <h1 style="color:#e74c3c">DERROTA</h1>
    <button class="m-btn restart" onclick="resetLevel()">REINICIAR FASE</button>
</div>

<div id="game-container">
    <div class="hud">
        <div>GOKU: <div class="bar"><div id="hp-fill" class="fill"></div></div><span id="hp-txt" style="color:#fff">1000/1000</span></div>
        <div>KI: <div class="bar"><div id="ki-fill" style="background:#00ffff; width:100%; height:100%;"></div></div></div>
        <div>VILÃO: <div class="bar"><div id="enemy-hp" class="fill"></div></div><span id="e-hp-txt" style="color:#fff">1000/1000</span></div>
    </div>
    <div id="level-indicator" style="color:gold; font-weight:bold; position:absolute; top:60px; left:50%; transform:translateX(-50%); text-transform: uppercase;">Fase 1: Freeza Final</div>
    
    <div id="kame-beam" class="kame-beam"></div>
    <div id="genki-sphere"></div>
    <div id="super-nova"></div>

    <div id="player">
        <div id="aura" style="position:absolute; top:-20px; left:-25px; width:100px; height:140px; background:rgba(0,255,255,0.3); border-radius:50%; filter:blur(15px); display:none;"></div>
        <div class="hair-goku"></div>
        <div style="position:absolute; top:5px; left:10px; width:30px; height:30px; background:#ffdbac; border-radius:50%;"></div>
        <div class="arm left" style="left:-8px;"></div><div class="arm right" style="right:-8px;"></div>
        <div style="position:absolute; top:32px; left:5px; width:40px; height:40px; background:#ff6600; clip-path:polygon(0 0, 100% 0, 85% 100%, 15% 100%);"></div>
        <div class="leg" style="left:8px;"></div><div class="leg" style="left:26px;"></div>
    </div>

    <div id="enemy">
        <div id="e-hair"></div>
        <div class="e-head-shape" id="e-head"></div>
        <div class="f-arm left" id="e-arm-l" style="left:-5px; background:#fff; border-top:6px solid #a020f0;"></div>
        <div class="f-arm right" id="e-arm-r" style="right:-5px; background:#fff; border-top:6px solid #a020f0;"></div>
        <div id="e-body" style="position:absolute; top:32px; left:8px; width:34px; height:40px; background:#fff; border-radius:10px;">
            <div id="v-extra-1"></div><div id="v-extra-2"></div>
            <div id="e-chest" style="position:absolute; top:10px; left:7px; width:20px; height:15px; background:#a020f0; border-radius:50%;"></div>
        </div>
        <div class="leg" style="left:8px; background:#fff; border-bottom:5px solid #a020f0;"></div>
        <div class="leg" style="left:26px; background:#fff; border-bottom:5px solid #a020f0;"></div>
    </div>

    <div class="controls">
        <div id="joy"></div>
        <div class="btn-grid">
            <button class="btn btn-ssj" id="ssj-btn" onclick="toggleSSJ()">AGUARDE</button>
            <button class="btn" id="punch-btn" style="background:#cc0000" onpointerdown="doAction('punch')">SOCO</button>
            <button class="btn" style="background:#555" onpointerdown="jump()">PULO</button>
            <button class="btn" style="background:#8800ff" onpointerdown="doAction('tp')">TP</button>
            <button class="btn" style="background:#0055ff" id="spec-btn" onpointerdown="doAction('special')">KAME</button>
            <button class="btn" id="ki-btn" style="background:#ffaa00" onpointerdown="doAction('blast')">KI</button>
            <button class="btn" style="background:#00aa00" id="charge-btn">RECARGA</button>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(f, t, d, v=0.1) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    const player = document.getElementById('player'), enemy = document.getElementById('enemy'), 
          winMenu = document.getElementById('win-menu'), loseMenu = document.getElementById('lose-menu'), nova = document.getElementById('super-nova');
    const punchBtn = document.getElementById('punch-btn'), kiBtn = document.getElementById('ki-btn'), specBtn = document.getElementById('spec-btn');
    
    let pX = 150, pY = 0, velY = 0, gHP = 1000, ki = 100, eX = 600, eHp = 1000;
    let isCharging = false, isSSJ = false, currentDir = 1, ssjCooldown = 20, isPaused = false, enemyCanShoot = true, enemyCanPunch = true;
    let supernovaTriggered = false, phase = 1;
    let canPunch = true, canKi = true, canSpecial = true; // canSpecial adicionado

    // JOYSTICK
    document.getElementById('joy').addEventListener('touchmove', (e) => {
        if(isPaused) return;
        e.preventDefault();
        const rect = e.target.getBoundingClientRect();
        if (e.touches[0].clientX < rect.left + rect.width / 2 - 10) { pX -= 8; currentDir = -1; player.style.transform = "scaleX(-1)"; }
        else if (e.touches[0].clientX > rect.left + rect.width / 2 + 10) { pX += 8; currentDir = 1; player.style.transform = "scaleX(1)"; }
        player.classList.add('walking');
    });
    document.getElementById('joy').addEventListener('touchend', () => player.classList.remove('walking'));

    function update() {
        if (isPaused) return;
        if (pY > 0 || velY !== 0) { velY -= 0.8; pY += velY; }
        if (pY <= 0) { pY = 0; velY = 0; }
        if (isCharging) {
            ki = Math.min(100, ki + 1.2);
            if (ki >= 100) gHP = Math.min(1000, gHP + 1.5);
        }
        let d = pX - eX; let absDist = Math.abs(d);
        let speed = (phase === 1) ? 3.5 : (phase === 2 ? 6 : 7.5);
        if (absDist > 250) eX += d > 0 ? speed : -speed;
        else if (absDist <= 85) { if (enemyCanPunch) enemyPunch(); }
        else if (enemyCanShoot) shootEnemyBeam();
        enemy.style.left = eX + 'px'; enemy.style.transform = d > 0 ? "scaleX(-1)" : "scaleX(1)";

        player.style.left = pX + 'px'; player.style.bottom = (40 + (pY/10)) + '%';
        document.getElementById('hp-fill').style.width = (gHP / 10) + '%';
        document.getElementById('enemy-hp').style.width = (eHp / 10) + '%';
        document.getElementById('hp-txt').innerText = `${Math.ceil(gHP)}/1000`;
        document.getElementById('e-hp-txt').innerText = `${Math.ceil(eHp)}/1000`;
        if(gHP <= 0) { isPaused = true; loseMenu.style.display = 'block'; }
        requestAnimationFrame(update);
    }

    function doAction(t) {
        if(isPaused) return;
        if(t==='punch' && canPunch) { 
            canPunch = false; punchBtn.classList.add('cooldown');
            player.classList.add('punching'); playSfx(200, 'square', 0.1);
            if (!supernovaTriggered) shootSupernova();
            if(Math.abs(pX-eX)<95) hitEnemy(isSSJ ? 100 : 40);
            setTimeout(() => { player.classList.remove('punching'); }, 200);
            setTimeout(() => { canPunch = true; punchBtn.classList.remove('cooldown'); }, 1000);
        }
        if(t==='special' && canSpecial && ki >= 40) { 
            canSpecial = false; specBtn.classList.add('cooldown');
            if(!isSSJ) shootKame(); else shootGenki();
            setTimeout(() => { canSpecial = true; specBtn.classList.remove('cooldown'); }, 4000);
        }
        if(t==='tp' && ki >= 20) { playSfx(1000, 'sine', 0.05); pX += 250*currentDir; }
        if(t==='blast' && canKi) { 
            canKi = false; kiBtn.classList.add('cooldown');
            ki -= 5; spawnKi();
            setTimeout(() => { canKi = true; kiBtn.classList.remove('cooldown'); }, 3000);
        }
    }

    // IA e Outras funções
    function enemyPunch() {
        enemyCanPunch = false; enemy.classList.add('e-punching');
        if (Math.abs(pX - eX) < 95) gHP -= 30;
        setTimeout(() => { enemy.classList.remove('e-punching'); enemyCanPunch = true; }, 1000);
    }
    function shootEnemyBeam() {
        enemyCanShoot = false; enemy.classList.add('shooting');
        const b = document.createElement('div'); b.style.cssText = "position:absolute; width:35px; height:6px; background:#fff; border-radius:10px;";
        b.style.boxShadow = phase === 3 ? "0 0 15px #a020f0" : "0 0 15px #fff";
        b.style.left = eX + 'px'; b.style.bottom = '48%'; document.getElementById('game-container').appendChild(b);
        let bX = eX, dir = pX > eX ? 1 : -1;
        let iv = setInterval(() => {
            bX += 25 * dir; b.style.left = bX + 'px';
            if(Math.abs(bX - pX) < 30 && pY < 50) { gHP -= (phase * 35); b.remove(); clearInterval(iv); }
            if(bX < 0 || bX > window.innerWidth) { b.remove(); clearInterval(iv); }
        }, 20);
        setTimeout(() => { enemy.classList.remove('shooting'); enemyCanShoot = true; }, 2000);
    }
    function shootSupernova() {
        supernovaTriggered = true; enemy.classList.add('nova-pose');
        nova.style.display = 'block'; nova.style.left = eX + 'px'; nova.style.top = '20%';
        setTimeout(() => { nova.style.width = '280px'; nova.style.height = '280px';
            setTimeout(() => { enemy.classList.remove('nova-pose'); nova.style.left = pX + 'px'; nova.style.top = '45%';
                setTimeout(() => { if (Math.abs(pX - parseInt(nova.style.left)) < 150) gHP -= 500; nova.style.display = 'none'; }, 1000);
            }, 1500);
        }, 100);
    }
    function hitEnemy(dmg) { eHp -= dmg; enemy.style.filter = "brightness(3)"; setTimeout(()=>enemy.style.filter="",100); if(eHp <= 0) { eHp = 0; isPaused = true; winMenu.style.display = 'block'; } }
    function advancePhase() { phase++; if (phase === 2) { document.getElementById('level-indicator').innerText = "Fase 2: Golden Freeza"; document.getElementById('e-head').style.background = "#ffd700"; document.getElementById('e-body').style.background = "#ffd700"; } else if (phase === 3) { document.getElementById('level-indicator').innerText = "Fase 3: Vegeta Saiyajin"; enemy.classList.add('vegeta-mode'); } resetLevel(); }
    function resetLevel() { isPaused = false; eHp = 1000; gHP = 1000; ki = 100; eX = 600; pX = 150; supernovaTriggered = false; winMenu.style.display = 'none'; loseMenu.style.display = 'none'; update(); }
    function toggleSSJ() { if(ssjCooldown > 0 || isSSJ) return; isSSJ=true; player.classList.add('ssj'); document.getElementById('spec-btn').innerText="GENKI"; setTimeout(() => { isSSJ=false; player.classList.remove('ssj'); document.getElementById('spec-btn').innerText="KAME"; startCD(); }, 15000); }
    function startCD() { ssjCooldown=20; let cd = setInterval(() => { ssjCooldown--; document.getElementById('ssj-btn').innerText=`SSJ (${ssjCooldown}s)`; if(ssjCooldown<=0){clearInterval(cd); document.getElementById('ssj-btn').classList.add('ready'); document.getElementById('ssj-btn').innerText="TRANSFORMAR!";} }, 1000); }
    function jump() { if(pY<=0 && !isPaused) { velY=17; playSfx(400, 'sine', 0.1); } }
    function spawnKi() {
        player.classList.add('ki-pose'); playSfx(400, 'triangle', 0.1);
        const k = document.createElement('div'); k.style.cssText = `position:absolute; width:20px; height:20px; background:#fff; border-radius:50%; left:${pX+25}px; bottom:${40+(pY/10)+5}%; box-shadow:0 0 10px #ff0;`;
        document.getElementById('game-container').appendChild(k);
        let kX = pX+25; let iv = setInterval(() => { kX += 20*currentDir; k.style.left = kX+'px'; if(Math.abs(kX-eX)<30){hitEnemy(50); k.remove(); clearInterval(iv);} if(kX<0||kX>window.innerWidth){k.remove(); clearInterval(iv);} },20);
        setTimeout(() => player.classList.remove('ki-pose'), 200);
    }
    function shootKame() {
        ki -= 40; player.classList.add('kame-pose');
        setTimeout(() => {
            const b = document.getElementById('kame-beam'); b.style.display = 'block';
            b.style.bottom = (40+(pY/10)+5)+'%'; b.style.left = currentDir==1 ? (pX+50)+'px' : '0px';
            b.style.width = currentDir==1 ? (window.innerWidth-pX)+'px' : pX+'px';
            if((currentDir==1 && eX>pX) || (currentDir==-1 && eX<pX)) hitEnemy(250);
            setTimeout(() => { b.style.display='none'; player.classList.remove('kame-pose'); }, 600);
        }, 300);
    }
    function shootGenki() {
        ki = 0; player.classList.add('genki-pose');
        const g = document.getElementById('genki-sphere'); g.style.display = 'block';
        g.style.left = pX + 'px'; g.style.top = '20%'; g.style.width = '250px'; g.style.height = '250px';
        setTimeout(() => {
            player.classList.remove('genki-pose'); g.style.left = eX + 'px'; g.style.top = '45%';
            setTimeout(() => { hitEnemy(1000); g.style.display='none'; }, 1000);
        }, 1500);
    }
    
    startCD(); update();
</script>
</body>
</html>
